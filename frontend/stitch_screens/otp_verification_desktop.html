<!-- Bottom Navigation Shell - Suppressed for Focused OTP Task as per Relevance Check -->
<script>
        // OTP Input Logic
        const inputs = document.querySelectorAll('.otp-input');
        
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            // Prevent non-numeric input
            input.addEventListener('keypress', (e) => {
                if (!/[0-9]/.test(e.key)) {
                    e.preventDefault();
                }
            });
        });

        // Simple Countdown Timer
        let time = 119;
        const timerElement = document.getElementById('timer');
        
        const countdown = setInterval(() => {
            const minutes = Math.floor(time / 60);
            const seconds = time % 60;
            timerElement.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            if (time <= 0) clearInterval(countdown);
            time--;
        }, 1000);

        // Form Submit Interaction
        document.getElementById('otp-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originalContent = btn.innerHTML;
            
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">progress_activity</span> <span>Verifying...</span>`;
            btn.disabled = true;
            
            setTimeout(() => {
                btn.classList.replace('button-gradient', 'bg-success');
                btn.innerHTML = `<span class="material-symbols-outlined">task_alt</span> <span>Success!</span>`;
                setTimeout(() => {
                    // Simulation of redirection or state change
                    btn.innerHTML = originalContent;
                    btn.classList.replace('bg-success', 'button-gradient');
                    btn.disabled = false;
                }, 2000);
            }, 1500);
        });
    </script>
