<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Admin Login | FoundIt AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f7f9fb;
            overflow: hidden;
        }

        .login-card {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(8px);
        }

        .btn-gradient {
            background: linear-gradient(135deg, #5b5fef 0%, #6b38d4 100%);
            box-shadow: 0 4px 15px rgba(91, 95, 239, 0.25);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-gradient:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(91, 95, 239, 0.35);
        }

        .btn-gradient:active {
            transform: scale(0.97);
        }

        .input-focus-ring:focus {
            border-color: #4143d5;
            box-shadow: 0 0 0 4px rgba(65, 67, 213, 0.1);
            outline: none;
        }

        .floating-element {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e0e3e5",
                        "border-default": "#E5E7EB",
                        "background": "#f7f9fb",
                        "primary-container": "#5b5fef",
                        "primary": "#4143d5",
                        "dark-bg": "#111827",
                        "surface": "#f7f9fb",
                        "card-bg": "#FFFFFF",
                        "text-secondary": "#6B7280",
                        "text-primary": "#111827",
                        "secondary": "#6b38d4"
                    },
                    "borderRadius": {
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "hero-title": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "page-title": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "hero-title": ["48px", {"lineHeight": "1.2", "fontWeight": "700"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "page-title": ["36px", {"lineHeight": "1.3", "fontWeight": "700"}],
                        "label-md": ["16px", {"lineHeight": "1.2", "fontWeight": "600"}]
                    }
                }
            }
        }
    </script>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
<!-- Decorative Animated Background elements -->
<div class="fixed inset-0 overflow-hidden pointer-events-none -z-10">
<div class="absolute top-[-10%] left-[-5%] w-96 h-96 bg-primary/5 rounded-full blur-3xl floating-element" style="animation-delay: 0s;"></div>
<div class="absolute bottom-[-10%] right-[-5%] w-[30rem] h-[30rem] bg-secondary/5 rounded-full blur-3xl floating-element" style="animation-delay: 2s;"></div>
</div>
<main class="w-full max-w-md">
<!-- Top Branding Section -->
<header class="text-center mb-10">
<div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-3xl login-card mb-6 overflow-hidden">
<div class="w-full h-full flex items-center justify-center bg-primary-container">
<span class="material-symbols-outlined text-white text-4xl" data-icon="search_check" style="font-variation-settings: 'FILL' 1;">search_check</span>
</div>
</div>
<h1 class="font-page-title text-page-title text-text-primary tracking-tight">FoundIt AI</h1>
<p class="font-body-md text-body-md text-text-secondary mt-2">Campus Admin Portal</p>
</header>
<!-- Login Form Card -->
<section class="bg-card-bg rounded-3xl p-8 login-card border border-white/50">
<form action="#" class="space-y-6" method="POST" onsubmit="return false;">
<!-- Admin ID Field -->
<div class="space-y-2">
<label class="font-label-md text-label-md text-text-primary ml-1" for="admin-id">Admin ID</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-secondary group-focus-within:text-primary transition-colors" data-icon="badge">badge</span>
</div>
<input class="block w-full pl-12 pr-4 py-4 bg-surface-container-low border border-border-default rounded-2xl font-body-md text-body-md text-text-primary input-focus-ring transition-all placeholder:text-text-secondary/50" id="admin-id" name="admin-id" placeholder="e.g. ADM-12345" required="" type="text">
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex items-center justify-between ml-1">
<label class="font-label-md text-label-md text-text-primary" for="password">Password</label>
<a class="text-sm font-semibold text-primary hover:text-secondary transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-text-secondary group-focus-within:text-primary transition-colors" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-12 pr-12 py-4 bg-surface-container-low border border-border-default rounded-2xl font-body-md text-body-md text-text-primary input-focus-ring transition-all placeholder:text-text-secondary/50" id="password" name="password" placeholder="••••••••" required="" type="password">
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-text-secondary hover:text-primary transition-colors" id="togglePassword" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember Me -->
<div class="flex items-center">
<input class="w-5 h-5 text-primary border-border-default rounded-lg focus:ring-primary/20" id="remember" type="checkbox">
<label class="ml-3 font-body-md text-body-md text-text-secondary select-none" for="remember">Trust this device for 30 days</label>
</div>
<!-- Login Button -->
<button class="w-full py-4 px-6 rounded-2xl text-white font-label-md text-label-md btn-gradient flex items-center justify-center gap-2 group" type="submit">
<span>Login as Admin</span>
<span class="material-symbols-outlined text-xl group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Support Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-text-secondary">
                    Need technical assistance? 
                    <a class="text-primary font-semibold hover:underline" href="#">Contact IT Support</a>
</p>
</div>
</section>
<!-- Footer Visual (Optional/Ambient) -->
<footer class="mt-12 flex flex-col items-center gap-6">
<div class="flex gap-4">
<div class="w-12 h-1 bg-border-default rounded-full"></div>
<div class="w-12 h-1 bg-primary/20 rounded-full"></div>
<div class="w-12 h-1 bg-border-default rounded-full"></div>
</div>
<p class="text-xs text-text-secondary/60 font-medium uppercase tracking-widest">Secure 256-bit AES Encryption</p>
</footer>
</main>
<!-- Simple micro-interaction for password visibility -->
<script>
        const togglePassword = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');
        const icon = togglePassword.querySelector('span');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            
            if (type === 'text') {
                icon.textContent = 'visibility_off';
            } else {
                icon.textContent = 'visibility';
            }
        });

        // Simple button active state feedback
        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.addEventListener('click', () => {
            const originalContent = submitBtn.innerHTML;
            submitBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <span>Authenticating...</span>
            `;
            setTimeout(() => {
                submitBtn.innerHTML = originalContent;
                // In a real app, this would redirect or show error
            }, 1500);
        });
    </script>
</body></html>
