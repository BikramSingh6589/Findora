<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-font-smoothing: antialiased;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .btn-gradient {
            background: linear-gradient(135deg, #4143d5 0%, #6b38d4 100%);
        }
        .animate-pop-in {
            animation: pop-in 0.5s cubic-bezier(0.26, 0.53, 0.74, 1.48) forwards;
        }
        @keyframes pop-in {
            0% { opacity: 0; transform: scale(0.9) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .reward-glow {
            box-shadow: 0 0 20px rgba(91,95,239,0.25);
        }
        .modal-backdrop {
            background-color: rgba(17, 24, 39, 0.6);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body class="bg-background text-on-surface min-h-screen">
<!-- TOP APP BAR (Suppressed because this is a focused success screen, but included as per Blueprint if required; hiding by logic) -->
<!-- The prompt implies a modal OVER a dashboard, so the background simulates the dashboard -->
<!-- Simulation of Dashboard Content underneath -->
<div class="fixed inset-0 overflow-hidden flex flex-col pointer-events-none opacity-40">
<header class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-md bg-background">
<span class="font-page-title text-page-title font-bold text-primary">Campus Connect</span>
<div class="flex gap-4">
<div class="w-10 h-10 rounded-full bg-surface-container"></div>
<div class="w-10 h-10 rounded-full bg-surface-container"></div>
</div>
</header>
<main class="flex-grow p-margin-desktop grid grid-cols-12 gap-gutter">
<div class="col-span-8 bg-white rounded-2xl h-64 border border-border-default"></div>
<div class="col-span-4 bg-white rounded-2xl h-64 border border-border-default"></div>
<div class="col-span-4 bg-white rounded-2xl h-96 border border-border-default"></div>
<div class="col-span-8 bg-white rounded-2xl h-96 border border-border-default"></div>
</main>
</div>
<!-- SUCCESS MODAL OVERLAY -->
<div class="fixed inset-0 z-[100] flex items-center justify-center modal-backdrop p-margin-mobile">
<!-- Modal Card -->
<div class="bg-surface-container-lowest w-full max-w-[520px] rounded-2xl shadow-2xl overflow-hidden animate-pop-in border border-white/20">
<!-- Hero Reward Section -->
<div class="relative h-48 bg-primary-container flex flex-col items-center justify-center overflow-hidden">
<!-- Abstract Decorative Shapes -->
<div class="absolute -top-10 -left-10 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
<div class="absolute -bottom-20 -right-20 w-64 h-64 bg-secondary/20 rounded-full blur-3xl"></div>
<!-- Badge Icon -->
<div class="relative z-10 w-24 h-24 bg-white rounded-full flex items-center justify-center shadow-xl reward-glow">
<span class="material-symbols-outlined text-primary text-[48px]" style="font-variation-settings: 'FILL' 1;">verified</span>
</div>
<!-- Particle/Confetti Effect Simulation -->
<div class="absolute inset-0 pointer-events-none">
<div class="absolute top-10 left-1/4 w-2 h-2 bg-warning rounded-full animate-bounce"></div>
<div class="absolute top-20 right-1/4 w-3 h-3 bg-success rounded-full animate-pulse"></div>
<div class="absolute bottom-10 left-1/3 w-2 h-2 bg-info-ai rounded-full animate-ping"></div>
</div>
</div>
<!-- Content Section -->
<div class="p-xl text-center">
<h1 class="font-page-title text-page-title text-primary mb-sm">Success! 🎉</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant mb-xl px-md">
                    Your report has been logged. You earned <span class="text-secondary font-bold">+50 XP</span> and a <span class="text-tertiary font-bold">Campus Hero</span> badge!
                </p>
<!-- XP Progress Bar Simulation -->
<div class="mb-xl bg-surface-container rounded-full h-4 relative overflow-hidden">
<div class="absolute top-0 left-0 h-full bg-gradient-to-r from-primary to-secondary rounded-full w-[75%] transition-all duration-1000 ease-out" id="xp-bar"></div>
</div>
<!-- Reward Chips -->
<div class="flex justify-center gap-sm mb-2xl">
<div class="flex items-center gap-xs px-md py-xs bg-success/10 text-success rounded-full font-label-md">
<span class="material-symbols-outlined text-[18px]">check_circle</span>
                        Verified
                    </div>
<div class="flex items-center gap-xs px-md py-xs bg-warning/10 text-tertiary rounded-full font-label-md">
<span class="material-symbols-outlined text-[18px]" style="font-variation-settings: 'FILL' 1;">workspace_premium</span>
                        Campus Hero
                    </div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-md">
<button class="btn-gradient w-full py-md rounded-xl text-on-primary font-label-md shadow-lg transform active:scale-95 transition-all hover:scale-[1.03] hover:shadow-primary/30">
                        Back to Dashboard
                    </button>
<button class="w-full py-md rounded-xl border border-border-default text-on-surface-variant font-label-md transform active:scale-95 transition-all hover:bg-surface-container-low">
                        View Report
                    </button>
</div>
</div>
<!-- Footer Message -->
<div class="bg-surface py-md text-center border-t border-border-default">
<p class="font-caption text-caption text-outline">You are currently ranked #12 in your dormitory league!</p>
</div>
</div>
</div>
<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const bar = document.getElementById('xp-bar');
            // Slight delay to trigger the transition after pop-in
            setTimeout(() => {
                bar.style.width = '85%';
            }, 600);

            // Button Click effects (Simple close simulation)
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const modal = document.querySelector('.animate-pop-in');
                    const backdrop = document.querySelector('.modal-backdrop');
                    modal.style.transform = 'scale(0.95)';
                    modal.style.opacity = '0';
                    backdrop.style.opacity = '0';
                    setTimeout(() => {
                        alert('Navigating to ' + btn.innerText);
                        location.reload(); // Reset for demo
                    }, 300);
                });
            });
        });
    </script>
</body></html>
