<!DOCTYPE html><html lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Lost&amp;Found AI - QR Scanner</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .scan-animation {
            position: absolute;
            width: 100%;
            height: 4px;
            background: linear-gradient(to bottom, transparent, #4143d5);
            box-shadow: 0 0 15px #4143d5;
            animation: scan 2s ease-in-out infinite;
        }

        @keyframes scan {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .camera-overlay {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
        }

        .corner-border {
            width: 40px;
            height: 40px;
            border-color: #4143d5;
            position: absolute;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface": "#f7f9fb",
                        "text-secondary": "#6B7280",
                        "surface-container-highest": "#e0e3e5",
                        "on-primary-fixed-variant": "#2c2cc3",
                        "on-primary": "#ffffff",
                        "surface-bright": "#f7f9fb",
                        "border-default": "#E5E7EB",

                        "on-secondary-fixed-variant": "#5516be",
                        "on-surface": "#191c1e",
                        "on-error-container": "#93000a",
                        "outline": "#767586",
                        "tertiary-fixed": "#ffdf9f",
                        "on-tertiary-fixed-variant": "#5c4300",
                        "on-secondary-container": "#fffbff",
                        "surface-tint": "#474adb",
                        "success": "#22C55E",

                        "on-error": "#ffffff",
                        "error": "#ba1a1a",

                        "on-primary-fixed": "#05006c",
                        "surface-dim": "#d8dadc",
                        "on-surface-variant": "#464555",
                        "dark-primary": "#8B80FF",
                        "error-container": "#ffdad6",
                        "secondary-fixed-dim": "#d0bcff",
                        "danger": "#F43F5E",
                        "on-tertiary": "#ffffff",
                        "primary": "#4143d5",
                        "surface-container": "#eceef0",
                        "primary-fixed-dim": "#c0c1ff",
                        "surface-container-low": "#f2f4f6",
                        "text-primary": "#111827",
                        "secondary-fixed": "#e9ddff",
                        "warning": "#FB923C",
                        "tertiary": "#735500",
                        "secondary-container": "#8455ef",
                        "on-secondary-fixed": "#23005c"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",

                    "fontFamily": {
                        "section-title": ["Plus Jakarta Sans"],
                        "card-title": ["Plus Jakarta Sans"],
                        "page-title": ["Plus Jakarta Sans"],
                        "hero-title": ["Plus Jakarta Sans"],
                        "body-md": ["Plus Jakarta Sans"],
                        "body-lg": ["Plus Jakarta Sans"],
                        "label-md": ["Plus Jakarta Sans"],
                        "caption": ["Plus Jakarta Sans"],
                        "page-title-mobile": ["Plus Jakarta Sans"]
                    },
                    "fontSize": {
                        "section-title": ["28px", {"lineHeight": "1.4", "fontWeight": "600"}],

<body class="bg-surface font-body-md text-text-primary h-screen flex flex-col overflow-hidden">
<!-- TopNavBar -->
<header class="bg-surface/80 backdrop-blur-md font-body-md text-body-md docked full-width top-0 sticky shadow-sm flex justify-between items-center w-full px-margin-mobile py-md z-50">
<div class="flex items-center gap-md">
<button class="p-2 hover:bg-surface-container rounded-full transition-colors active:scale-95">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-page-title-mobile text-page-title-mobile font-bold text-primary">Scan to Receive Item</h1>
</div>
<div class="flex items-center gap-md">
<span class="material-symbols-outlined text-on-surface-variant">auto_awesome</span>
<div class="w-8 h-8 rounded-full bg-primary-fixed flex items-center justify-center overflow-hidden border border-primary-container">
<img class="w-full h-full object-cover" data-alt="A professional headshot of a friendly student wearing a campus hoodie, bright natural lighting, soft focus background of a modern university library, Corporate Modern style, clean and approachable aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDgsrSLzr-8FR8a14yP7y-Mva1Ah7ialF-tSwlduO064Rvg9cbAZTtO28dcdQV_6aRnvU7ALsO_vc69jW5v9P65L68FCihmohoVzwplKBv-3TJ48CVVbfN8JWCpa5EL6jZvbEv5Wz5U35Z3eXM7gTrKkCbV4q0S7SE0m2Lm_0H3FOHlw9V8a62guz7G-QldFsbXiZyc4j7p8_HkRWGM5W9Jc-8rE8vSP8vxEIVJWyuxs6QgIWwXwcHbhREQeR824RnRzp34DiFixG8">
</div>
</div>
</header>
<!-- Scanner Main Content -->
<main class="flex-1 relative bg-black flex flex-col items-center justify-center">
<!-- Camera View Placeholder -->
<div class="absolute inset-0 z-0">
<div class="w-full h-full bg-cover bg-center opacity-70" data-alt="A first-person perspective view of a smartphone camera viewfinder showing a blurry university campus courtyard background with students walking in the distance. The lighting is bright and sunny, creating a high-contrast cinematic atmosphere for an augmented reality scanning experience." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDSweZyafG8bkRrD2dXL1NQ3ihQZyL8gSptExy1KBn8zdtRCMsENbGxillvVW6Z6EbeUeYGPINQYFVFCuk0D1z3tVA_uMFvAz49pAY3sYVb0Fd95AjZVbgYxIWuQE3n5SIhpZ4oVTnX9PWx8L4bXfJEKcb4F2FLSPlj7l5dCoO5D2jgCYS-3HYCIerxDbYQPCCMZpe4AWMM6zG07OC1ngAUBH-LmACPaMp3Cn9FLCeZpP8rvL-aS2EMea8AVKXqgyXq9xy0o2PmzPM')"></div>
</div>
<!-- Scanner Overlay -->
<div class="absolute inset-0 z-10 flex flex-col">
<!-- Top Darkened Area -->
<div class="camera-overlay flex-1"></div>
<div class="flex h-[280px]">
<!-- Left Darkened Area -->
<div class="camera-overlay w-margin-mobile md:w-margin-desktop"></div>
<!-- Scanning Square -->
<div class="relative w-[280px] h-[280px]">
<!-- Corners -->
<div class="corner-border top-0 left-0 border-t-4 border-l-4 rounded-tl-2xl" style="transform: scale(1.05);"></div>
<div class="corner-border top-0 right-0 border-t-4 border-r-4 rounded-tr-2xl" style="transform: scale(1.05);"></div>
<div class="corner-border bottom-0 left-0 border-b-4 border-l-4 rounded-bl-2xl" style="transform: scale(1.05);"></div>
<div class="corner-border bottom-0 right-0 border-b-4 border-r-4 rounded-br-2xl" style="transform: scale(1.05);"></div>
<!-- Scanner Beam -->
<div class="scan-animation"></div>
<!-- Inner Grid Pattern (Subtle) -->
<div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#ffffff 1px, transparent 1px); background-size: 20px 20px;"></div>
</div>
<!-- Right Darkened Area -->
<div class="camera-overlay w-margin-mobile md:w-margin-desktop"></div>
</div>
<!-- Bottom Darkened Area with CTA -->
<div class="camera-overlay flex-1 flex flex-col items-center pt-xl px-xl text-center">
<div class="bg-primary/20 backdrop-blur-lg border border-primary/30 rounded-2xl p-md max-w-xs mb-lg">
<p class="text-white font-label-md text-label-md">Align the QR code from the Finder's screen within the frame.</p>
</div>
<div class="flex gap-lg">
<button class="w-14 h-14 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center text-white border border-white/20 active:scale-90 transition-transform">
<span class="material-symbols-outlined">flashlight_on</span>
</button>
<button class="w-14 h-14 rounded-full bg-white/10 backdrop-blur-md flex items-center justify-center text-white border border-white/20 active:scale-90 transition-transform">
<span class="material-symbols-outlined">image</span>
</button>
</div>
</div>
</div>
</main>
<!-- Footer Instructions -->
<div class="bg-surface px-margin-mobile py-lg text-center z-20">
<div class="flex items-center justify-center gap-xs text-warning mb-1">
<span class="material-symbols-outlined text-[20px]">warning</span>
<p class="font-label-md text-label-md">Security Check</p>
</div>
<p class="text-on-surface-variant font-body-md text-body-md leading-snug">
            Ensure you have physically inspected the item before scanning.
        </p>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 py-3 bg-surface shadow-lg rounded-t-xl pb-safe">
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-xl">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-caption text-caption">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-xl">
<span class="material-symbols-outlined" data-icon="add_box">add_box</span>
<span class="font-caption text-caption">Report</span>
</div>
<div class="flex flex-col items-center justify-center text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-xl">
<span class="material-symbols-outlined" data-icon="auto_awesome">auto_awesome</span>
<span class="font-caption text-caption">Matches</span>
</div>
<!-- Active Tab: Profile (Closest match for item retrieval/personal actions) -->
<div class="flex flex-col items-center justify-center text-primary bg-primary-fixed/30 rounded-full px-4 py-1 active:scale-90 duration-100">
<span class="material-symbols-outlined" data-icon="person" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-caption text-caption">Profile</span>
</div>
</nav>
<script>
        // Simple micro-interaction for the scanner corners
        document.addEventListener('DOMContentLoaded', () => {
            const corners = document.querySelectorAll('.corner-border');
            setInterval(() => {
                corners.forEach(corner => {
                    corner.style.transform = 'scale(1.05)';
                    setTimeout(() => {
                        corner.style.transform = 'scale(1)';
                    }, 500);
                });
            }, 2000);
        });
    </script>
</body></html>
