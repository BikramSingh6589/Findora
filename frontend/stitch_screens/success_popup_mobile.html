<style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: #f7f9fb;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .gradient-button {
        background: linear-gradient(135deg, #4143d5 0%, #6b38d4 100%);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .gradient-button:active {
        transform: scale(0.95);
      }
      .xp-badge-gradient {
        background: linear-gradient(135deg, #f9bd22 0%, #fb923c 100%);
      }
      .modal-entrance {
        animation: modalScaleUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      @keyframes modalScaleUp {
        from { transform: scale(0.8); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }
      .confetti-particle {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 2px;
        animation: fall 3s linear infinite;
      }
      @keyframes fall {
        to { transform: translateY(100vh) rotate(360deg); }
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background overflow-hidden">
<!-- Background Content Simulator (Blurred) -->
<div class="fixed inset-0 w-full h-full flex flex-col p-margin-mobile blur-sm pointer-events-none">
<header class="flex justify-between items-center py-md">
<span class="font-page-title-mobile text-page-title-mobile font-bold text-primary">Campus Connect</span>
<span class="material-symbols-outlined text-on-surface-variant">help_outline</span>
</header>
<div class="mt-lg space-y-md">
<div class="w-full h-48 bg-surface-container rounded-24px"></div>
<div class="w-3/4 h-8 bg-surface-container rounded-full"></div>
<div class="w-full h-32 bg-surface-container rounded-24px"></div>
</div>
</div>
<!-- Success Popup Modal -->
<div class="fixed inset-0 z-50 flex items-center justify-center p-margin-mobile bg-on-surface/40 backdrop-blur-md" id="modal-overlay">
<!-- Modal Container -->
<div class="modal-entrance relative w-full max-w-[390px] bg-card-bg rounded-24px overflow-hidden shadow-[0_20px_50px_rgba(65,67,213,0.15)] flex flex-col items-center text-center p-xl">
<!-- Confetti/Decoration Area -->
<div class="absolute inset-0 pointer-events-none overflow-hidden opacity-30">
<div class="confetti-particle bg-primary left-1/4 -top-4" style="animation-delay: 0.1s"></div>
<div class="confetti-particle bg-secondary left-1/2 -top-4" style="animation-delay: 0.5s"></div>
<div class="confetti-particle bg-success left-3/4 -top-4" style="animation-delay: 1.2s"></div>
<div class="confetti-particle bg-warning left-1/3 -top-4" style="animation-delay: 0.8s"></div>
</div>
<!-- Success Illustration/Icon -->
<div class="relative mb-lg">
<!-- Outer Glow -->
<div class="absolute inset-0 bg-success/20 blur-3xl rounded-full scale-150"></div>
<div class="relative w-24 h-24 bg-success/10 rounded-full flex items-center justify-center border-4 border-success/5 animate-pulse">
<div class="w-16 h-16 bg-success rounded-full flex items-center justify-center shadow-[0_8px_20px_rgba(34,197,94,0.3)]">
<span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</div>
</div>
<!-- Content -->
<h1 class="font-page-title-mobile text-page-title-mobile text-text-primary mb-xs">Success! 🎉</h1>
<p class="font-body-md text-body-md text-text-secondary mb-lg">

            </p>

<div class="w-full bg-surface-container-low rounded-full h-3 mb-xl relative overflow-hidden">

</div>

<span class="font-label-md text-caption text-tertiary">Senior Contributor Level Up in 200 XP</span>
</div>

            </button>
<!-- Secondary Micro-interaction -->

            </p>

<script>
        function closeModal() {
            const modal = document.getElementById('modal-overlay');
            modal.style.transition = 'opacity 0.2s ease, transform 0.2s ease';
            modal.style.opacity = '0';
            modal.style.transform = 'scale(0.95)';
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 200);
        }

        // Particle generation for some subtle excitement
        function createConfetti() {
            const colors = ['#4143d5', '#6b38d4', '#22C55E', '#FB923C', '#38BDF8'];
            const container = document.querySelector('.absolute.inset-0.pointer-events-none');
            
            for(let i = 0; i < 15; i++) {
                const particle = document.createElement('div');
                particle.className = 'confetti-particle';
                particle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = -10 + 'px';
                particle.style.width = (Math.random() * 6 + 4) + 'px';
                particle.style.height = (Math.random() * 6 + 4) + 'px';
                particle.style.animationDuration = (Math.random() * 2 + 1) + 's';
                particle.style.animationDelay = (Math.random() * 2) + 's';
                container.appendChild(particle);
            }
        }
        
        createConfetti();
    </script>
</body></html>
