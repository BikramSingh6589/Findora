<script>
    // Micro-interaction: Confetti Burst on Load
    function createConfetti() {
      const container = document.getElementById('confetti-container');
      const colors = ['#4143d5', '#6b38d4', '#8455ef', '#38BDF8', '#FB923C'];
      
      for (let i = 0; i < 40; i++) {
        const confetti = document.createElement('div');
        confetti.className = 'confetti';
        
        // Random properties
        const color = colors[Math.floor(Math.random() * colors.length)];
        const left = Math.random() * 100 + '%';
        const top = '-10%';
        const size = (Math.random() * 8 + 4) + 'px';
        const delay = Math.random() * 2;
        const duration = Math.random() * 2 + 3;
        
        confetti.style.left = left;
        confetti.style.backgroundColor = color;
        confetti.style.width = size;
        confetti.style.height = size;
        confetti.style.opacity = Math.random();
        
        container.appendChild(confetti);

        // Animate
        confetti.animate([
          { transform: `translateY(0) rotate(0deg)`, opacity: 1 },
          { transform: `translateY(500px) rotate(${Math.random() * 360}deg)`, opacity: 0 }
        ], {
          duration: duration * 1000,
          delay: delay * 1000,
          easing: 'cubic-bezier(0.25, 0.46, 0.45, 0.94)',
          fill: 'forwards'
        });
      }
    }

    // Trigger animation slightly after modal scale up
    setTimeout(createConfetti, 400);

    // Subtle parallax effect on illustration for "Tactile" feel
    document.addEventListener('mousemove', (e) => {
      const illustration = document.querySelector('.modal-content img');
      const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
      const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
      if(illustration) {
        illustration.style.transform = `translate(${xAxis}px, ${yAxis}px)`;
      }
    });
  </script>
