<!-- Interactive Micro-interactions Script -->
<script>
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const passwordIcon = document.getElementById('passwordIcon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                passwordIcon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                passwordIcon.innerText = 'visibility';
            }
        }

        // Form Submission Simulation
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            
            // Loading State
            btn.disabled = true;
            btn.innerHTML = `
                <div class="w-6 h-6 border-2 border-on-primary border-t-transparent rounded-full animate-spin"></div>
                Authenticating...
            `;

            // Simulate API Call
            setTimeout(() => {
                btn.innerHTML = `
                    <span class="material-symbols-outlined text-[20px]">check_circle</span>
                    Success!
                `;
                btn.classList.remove('gradient-btn');
                btn.classList.add('bg-success');
                
                setTimeout(() => {
                    // Redirect simulation
                    console.log('Redirecting to dashboard...');
                    btn.innerHTML = originalContent;
                    btn.disabled = false;
                    btn.classList.remove('bg-success');
                    btn.classList.add('gradient-btn');
                }, 1000);
            }, 1500);
        });

        // Atmospheric Particle Effect (Canvas-free micro interaction)
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            document.documentElement.style.setProperty('--mouse-x', x);
            document.documentElement.style.setProperty('--mouse-y', y);
        });
    </script>
