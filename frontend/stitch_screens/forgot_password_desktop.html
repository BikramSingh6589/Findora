<body class="bg-background text-text-primary min-h-screen flex flex-col">

                        Lost your key? 🔐

<p class="font-body-lg text-body-lg text-text-secondary max-w-sm mx-auto">
                        Don't worry, Alex! Just enter your university email and we'll help you get back in.

</div>

<script>
        // Simple form interaction
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = this.querySelector('button');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = `
                <span class="animate-spin material-symbols-outlined">sync</span>
                <span>Sending...</span>
            `;
            btn.classList.add('opacity-80', 'cursor-not-allowed');

            setTimeout(() => {
                btn.innerHTML = `
                    <span class="material-symbols-outlined">check_circle</span>
                    <span>Code Sent!</span>
                `;
                btn.classList.remove('btn-gradient');
                btn.classList.add('bg-success');
                
                // Reset after some time for demo
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.add('btn-gradient');
                    btn.classList.remove('bg-success', 'opacity-80', 'cursor-not-allowed');
                }, 3000);
            }, 1500);
        });
    </script>
