<body class="min-h-screen flex flex-col text-on-background">

<div class="max-w-md mx-auto">
<!-- Header Section -->

<div class="inline-flex items-center justify-center w-20 h-20 bg-primary-fixed rounded-3xl mb-md shadow-lg shadow-primary/10">

<p class="font-body-md text-on-surface-variant max-w-[280px] mx-auto">Set a strong new password for your Campus Connect account.</p>
</div>
<!-- Interaction Card -->
<div class="bg-card-bg rounded-3xl p-lg shadow-[0_8px_30px_rgba(0,0,0,0.06)] border border-surface-container relative overflow-hidden">
<div class="absolute -top-12 -right-12 w-24 h-24 bg-primary/5 rounded-full blur-2xl"></div>
<form class="space-y-lg relative z-10" onsubmit="event.preventDefault();">
<!-- Password Field 1 -->
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant block ml-1">New Password</label>
<div class="relative group input-focus-glow rounded-2xl border border-outline-variant bg-surface-container-lowest transition-all duration-200">
<input class="w-full bg-transparent border-none rounded-2xl py-4 pl-4 pr-12 text-text-primary font-body-md focus:ring-0 placeholder:text-outline/50" id="password-1" placeholder="Min. 8 characters" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" onclick="togglePassword('password-1', this)" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Password Field 2 -->
<div class="space-y-xs">
<label class="font-label-md text-on-surface-variant block ml-1">Confirm Password</label>
<div class="relative group input-focus-glow rounded-2xl border border-outline-variant bg-surface-container-lowest transition-all duration-200">
<input class="w-full bg-transparent border-none rounded-2xl py-4 pl-4 pr-12 text-text-primary font-body-md focus:ring-0 placeholder:text-outline/50" id="password-2" placeholder="Repeat new password" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" onclick="togglePassword('password-2', this)" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</div>
<!-- Strength Indicator -->

<span class="font-caption text-on-surface-variant">Password strength</span>

</div>

<div class="h-full w-1/4 rounded-full bg-success"></div>
<div class="h-full w-1/4 rounded-full bg-success"></div>
<div class="h-full w-1/4 rounded-full bg-success"></div>
<div class="h-full w-1/4 rounded-full bg-surface-variant"></div>

<span class="material-symbols-outlined">notifications</span>

</a>

<a class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-xl px-4 py-1.5 active:scale-90 transition-transform duration-150" href="#">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-md text-label-md mt-1">Profile</span>
</a>

<script>
        function togglePassword(id, button) {
            const input = document.getElementById(id);
            const icon = button.querySelector('.material-symbols-outlined');
            if (input.type === "password") {
                input.type = "text";
                icon.textContent = "visibility_off";
            } else {
                input.type = "password";
                icon.textContent = "visibility";
            }
        }

        // Lightweight interaction for the form success mock-up
        document.querySelector('form').addEventListener('submit', function(e) {
            const btn = e.target.querySelector('button[type="submit"]');
            const originalContent = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin">refresh</span> Processing...`;
            
            setTimeout(() => {
                btn.innerHTML = `<span class="material-symbols-outlined">check_circle</span> Success!`;
                btn.classList.replace('btn-gradient', 'bg-success');
                btn.classList.remove('shadow-primary/25');
                btn.classList.add('shadow-success/25');
            }, 1500);
        });
    </script>
