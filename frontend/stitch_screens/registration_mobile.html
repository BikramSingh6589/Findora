<body class="antialiased text-on-background min-h-screen flex flex-col items-center justify-center relative px-margin-mobile py-lg overflow-y-auto">
<!-- Decorative Animated Background -->
<div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">

<div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-primary-container/20 rounded-full blur-3xl float-animation"></div>
<div class="absolute bottom-[-5%] left-[-5%] w-80 h-80 bg-secondary-container/20 rounded-full blur-3xl float-animation" style="animation-delay: -2s;"></div>
</div>
<!-- Main Registration Container -->
<main class="w-full max-w-md z-10">
<!-- Logo & Header Section -->
<div class="text-center mb-xl">
<div class="inline-flex items-center justify-center p-sm bg-primary rounded-2xl shadow-lg shadow-primary/20 mb-md">
<span class="material-symbols-outlined text-[32px] text-white" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<h1 class="font-page-title-mobile text-page-title-mobile text-text-primary mb-xs">Join Lost&amp;Found AI</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Your helpful senior student assistant is waiting to help you find what's yours.</p>
</div>
<!-- Registration Form Card -->
<div class="glass-card p-lg rounded-2xl shadow-xl space-y-lg border border-white/40">
<form action="#" class="space-y-md" method="POST">
<!-- Full Name Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface ml-1" for="full_name">Full Name</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">person</span>
</div>
<input class="w-full bg-white border border-border-default rounded-xl py-md pl-11 pr-md font-body-md text-body-md outline-none transition-all duration-200 focus:border-primary input-focus-ring placeholder:text-text-secondary/50" id="full_name" name="full_name" placeholder="John Doe" type="text">
</div>
</div>
<!-- University Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface ml-1" for="university_email">University Email</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">alternate_email</span>
</div>
<input class="w-full bg-white border border-border-default rounded-xl py-md pl-11 pr-md font-body-md text-body-md outline-none transition-all duration-200 focus:border-primary input-focus-ring placeholder:text-text-secondary/50" id="university_email" name="university_email" placeholder="j.doe@university.edu" type="email">
</div>
</div>
<!-- Student ID Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface ml-1" for="student_id">Student ID</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">badge</span>
</div>
<input class="w-full bg-white border border-border-default rounded-xl py-md pl-11 pr-md font-body-md text-body-md outline-none transition-all duration-200 focus:border-primary input-focus-ring placeholder:text-text-secondary/50" id="student_id" name="student_id" placeholder="U2024001" type="text">
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-on-surface ml-1" for="password">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full bg-white border border-border-default rounded-xl py-md pl-11 pr-md font-body-md text-body-md outline-none transition-all duration-200 focus:border-primary input-focus-ring placeholder:text-text-secondary/50" id="password" name="password" placeholder="••••••••" type="password">
<button class="absolute inset-y-0 right-0 pr-md flex items-center text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full mt-lg py-md px-lg bg-gradient-to-r from-primary to-secondary text-white font-label-md text-label-md rounded-xl shadow-lg shadow-primary/25 hover:scale-[1.03] active:scale-95 transition-all duration-200 flex items-center justify-center gap-sm group" type="submit">
                    Create My Account
                    <span class="material-symbols-outlined text-[20px] group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</form>
<!-- Divider -->

<!-- Social Login Options -->

</div>
<!-- Footer Link -->
<div class="mt-lg text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Already have an account? 
                <a class="text-primary font-bold hover:underline transition-all" href="#">Login</a>
</p>
<p class="font-body-md text-body-md text-on-surface-variant mt-md">Staff member? <a class="text-primary font-bold hover:underline transition-all" href="#">Administrative Login</a></p></div>
<!-- Trust Badge / Micro-copy -->
<div class="mt-2xl flex items-center justify-center gap-sm opacity-60">
<span class="material-symbols-outlined text-[18px] text-success" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<p class="font-caption text-caption text-on-surface">Secured by Campus Network Auth</p>
</div>
</main>
<!-- Background Illustration Detail -->
<div class="fixed bottom-margin-mobile right-margin-mobile opacity-10 pointer-events-none hidden md:block">

</div>
<script>
        // Micro-interaction for the "Helpful Senior" vibe
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            const submitBtn = document.querySelector('button[type="submit"]');

            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    // Visual feedback logic if needed
                });
            });

            // Prevent default for demo
            document.querySelector('form').addEventListener('submit', (e) => {
                e.preventDefault();
                submitBtn.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Creating...';
                setTimeout(() => {
                    submitBtn.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Welcome!';
                    submitBtn.classList.replace('bg-gradient-to-r', 'bg-success');
                }, 1500);
            });
        });
    </script>


</body></html>
